services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./LDJS-Back-end-Automatisez-les-tests-et-le-release-continus-avec-Docker
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/workshopsdb
      - CORS_ORIGIN=http://localhost
    depends_on:
      - mongodb

  frontend:
    build: ./LDJS-Front-end-Automatisez-les-tests-et-le-release-continus-avec-Docker
    ports:
      - "80:80"

volumes:
  mongo-data: