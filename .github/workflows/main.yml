name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: 
          - 'LDJS-Back-end-Automatisez-les-tests-et-le-release-continus-avec-Docker'
          - 'LDJS-Front-end-Automatisez-les-tests-et-le-release-continus-avec-Docker'
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Test
        working-directory: ${{ matrix.folder }}
        run: |
          npm install
          npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        working-directory: ${{ matrix.folder }}
        run: |
          IMAGE_NAME=webdevoo/${{ matrix.folder }}:${{ github.sha }}
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME