name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: 
          - 'LDJS-Back-end-Automatisez-les-tests-et-le-release-continus-avec-Docker'
          - 'LDJS-Front-end-Automatisez-les-tests-et-le-release-continus-avec-Docker'
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Test
        working-directory: ${{ matrix.folder }}
        run: |
          npm install
          npm test

      - name: Build Docker Image
        working-directory: ${{ matrix.folder }}
        run: docker build -t ${{ matrix.folder }}:${{ github.sha }} .