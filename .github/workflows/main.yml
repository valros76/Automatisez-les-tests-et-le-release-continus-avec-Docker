name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          FOLDERS=$(find . -maxdepth 2 -name "package.json" -exec dirname {} \; | cut -c3- | jq -R . | jq -s -c .)
          echo "matrix=$FOLDERS" >> $GITHUB_OUTPUT

  test-and-build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and Test
        working-directory: ${{ matrix.folder }}
        run: |
          npm install
          npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        working-directory: ${{ matrix.folder }}
        run: |
          FOLDER_NAME=$(basename "${{ matrix.folder }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=webdevoo/$FOLDER_NAME:${{ github.sha }}
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME